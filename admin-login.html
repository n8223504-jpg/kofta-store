<!DOCTYPE html>
<html>

<head>
<title>Admin Login</title>

<style>

body{
background:#0b1a33;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#13264d;
padding:40px;
border-radius:10px;
text-align:center;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:200px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#2ecc71;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="koftawy" && p==="Html123"){

localStorage.setItem("admin","true")

location.href="admin.html"

}else{

alert("Wrong login")

}

}

</script>

</body>
</html>
