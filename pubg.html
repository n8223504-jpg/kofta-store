<!DOCTYPE html>
<html>

<head>

<title>PUBG UC Charge</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
margin:0;
overflow:hidden;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-2;
}

.container{
position:relative;
background:#1e293b;
padding:40px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
overflow:hidden;
z-index:1;
}

/* موجة الضوء */

.container::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#facc1530,transparent 60%);
animation:waveMove 8s linear infinite;
top:-50%;
left:-50%;
pointer-events:none;
z-index:0;
}

@keyframes waveMove{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

h1{
color:#facc15;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#334155;
color:white;
position:relative;
z-index:2;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#facc15;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px #facc15;
animation:pulseGlow 2s infinite;
position:relative;
z-index:2;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px #facc15,0 0 50px #facc15;
}

@keyframes pulseGlow{
0%{box-shadow:0 0 10px #facc15}
50%{box-shadow:0 0 25px #facc15}
100%{box-shadow:0 0 10px #facc15}
}

.back{
display:block;
margin-top:15px;
color:#94a3b8;
text-decoration:none;
}

.notice{
font-size:13px;
color:#facc15;
margin-top:10px;
position:relative;
z-index:2;
}

.vodafone{
margin-top:10px;
font-size:18px;
font-weight:bold;
color:#facc15;
cursor:pointer;
padding:8px;
border-radius:6px;
background:#0f172a;
position:relative;
z-index:2;
}

.vodafone:hover{
background:#1e293b;
}

.copyMsg{
font-size:12px;
color:#4ade80;
margin-top:5px;
display:none;
position:relative;
z-index:2;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="container">

<h1>PUBG UC</h1>

<input id="playerId" type="text" placeholder="Enter Player ID">

<select id="amount">

<option>60 UC - 49 جنيه</option>
<option>120 UC - 90 جنيه</option>
<option>325 UC - 239 جنيه</option>
<option>660 UC - 449 جنيه</option>
<option>1800 UC - 1115 جنيه</option>
<option>3850 UC - 2227 جنيه</option>
<option>8100 UC - 4450 جنيه</option>

</select>

<div class="notice">
حول المبلغ إلى رقم فودافون كاش التالي
</div>

<div class="vodafone" onclick="copyNumber()">
+201018702697
</div>

<div id="copied" class="copyMsg">
تم نسخ الرقم ✔
</div>

<input id="wallet" type="text" placeholder="رقم المحفظة اللي هتحول منها">

<div class="notice">
بعد التحويل اكتب رقم المحفظة واضغط شحن
</div>

<button onclick="charge()">Charge Now</button>

<a class="back" href="web.html">Back to Home</a>

</div>

<script>

particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:2},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.2
}
}
})

function copyNumber(){

navigator.clipboard.writeText("+201018702697")

document.getElementById("copied").style.display="block"

setTimeout(()=>{
document.getElementById("copied").style.display="none"
},2000)

}

function generateOrderId(){
return "ORD-" + Math.floor(Math.random()*1000000);
}

function charge(){

const playerId=document.getElementById("playerId").value
const amount=document.getElementById("amount").value
const wallet=document.getElementById("wallet").value

if(playerId===""||wallet===""){
alert("يرجى ملء كل البيانات")
return
}

const orderId=generateOrderId()

fetch("/api/charge",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

orderId:orderId,
game:"PUBG",
playerId:playerId,
amount:amount,
wallet:wallet

})

})

.then(res=>res.json())
.then(data=>{

alert("تم إرسال الطلب رقم: "+orderId)

})

}

</script>

</body>

</html>
