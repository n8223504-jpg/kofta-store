<!DOCTYPE html>
<html>

<head>
<title>Admin Panel</title>

<style>

body{
background:#0b1a33;
color:white;
font-family:Arial;
text-align:center;
}

.top{
display:flex;
justify-content:space-between;
padding:20px;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:10px;
}

.box{
padding:10px 20px;
border-radius:6px;
font-weight:bold;
}

.pendingBox{background:orange}
.acceptedBox{background:green}
.rejectedBox{background:red}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid white;
padding:8px 15px;
}

button{
padding:5px 10px;
margin:2px;
border:none;
cursor:pointer;
border-radius:4px;
}

.accept{background:green;color:white}
.reject{background:red;color:white}
.delete{background:gray;color:white}
.logout{background:#ff9800;color:white}

.status-pending{color:orange;font-weight:bold}
.status-accepted{color:lime;font-weight:bold}
.status-rejected{color:red;font-weight:bold}

</style>
</head>

<body>

<div class="top">
<h2>Orders (<span id="count">0</span>)</h2>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="stats">
<div class="box pendingBox">Pending: <span id="pendingCount">0</span></div>
<div class="box acceptedBox">Accepted: <span id="acceptedCount">0</span></div>
<div class="box rejectedBox">Rejected: <span id="rejectedCount">0</span></div>
</div>

<table>

<thead>
<tr>

<th>Order ID</th>
<th>Game</th>
<th>Player ID</th>
<th>Amount</th>
<th>Wallet</th>
<th>Status</th>
<th>Actions</th>

</tr>
</thead>

<tbody id="orders"></tbody>

</table>

<script>

if(localStorage.getItem("admin")!="true"){
location.href="login.html"
}

function logout(){
localStorage.removeItem("admin")
location.href="login.html"
}

let lastCount = 0

async function loadOrders(){

const res = await fetch("/api/orders")
const orders = await res.json()

document.getElementById("count").innerText = orders.length

if(orders.length > lastCount){
new Audio("notify.mp3").play()
}

lastCount = orders.length

let html=""
let pending=0
let accepted=0
let rejected=0

orders.forEach(o=>{

if(o.status=="pending") pending++
if(o.status=="accepted") accepted++
if(o.status=="rejected") rejected++

let statusClass="status-pending"
if(o.status=="accepted") statusClass="status-accepted"
if(o.status=="rejected") statusClass="status-rejected"

html+=`
<tr>

<td>${o.orderId || "-"}</td>

<td>${o.game}</td>

<td>${o.playerId}</td>

<td>${o.amount}</td>

<td>${o.wallet || "-"}</td>

<td class="${statusClass}">${o.status}</td>

<td>

<button class="accept" onclick="accept('${o._id}')">Accept</button>

<button class="reject" onclick="reject('${o._id}')">Reject</button>

<button class="delete" onclick="removeOrder('${o._id}')">Delete</button>

</td>

</tr>
`

})

document.getElementById("orders").innerHTML = html

document.getElementById("pendingCount").innerText=pending
document.getElementById("acceptedCount").innerText=accepted
document.getElementById("rejectedCount").innerText=rejected

}

async function accept(id){
await fetch("/api/orders/accept/"+id,{method:"POST"})
loadOrders()
}

async function reject(id){
await fetch("/api/orders/reject/"+id,{method:"POST"})
loadOrders()
}

async function removeOrder(id){
await fetch("/api/orders/delete/"+id,{method:"POST"})
loadOrders()
}

loadOrders()
setInterval(loadOrders,3000)

</script>

</body>
</html>
