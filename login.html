<!DOCTYPE html>
<html>

<head>

<title>User Login</title>

<link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
margin:0;
font-family:"Funnel Display", sans-serif;
background:#0f0f0f;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-container{
background:#1a1a1a;
padding:40px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.login-container h2{
color:white;
margin-bottom:25px;
}

.login-container input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
background:#2a2a2a;
color:white;
}

.login-container button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#ee626b;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-container button:hover{
background:#ff4d57;
}

.google-btn{
margin-top:15px;
display:flex;
justify-content:center;
}

.back-home{
margin-top:15px;
display:block;
color:#aaa;
text-decoration:none;
font-size:14px;
}

.back-home:hover{
color:white;
}

</style>

</head>

<body>

<div class="login-container">

<h2>Login to Kofta Store</h2>

<input type="text" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<div id="g_id_onload"
data-client_id="354144798164-ncaoui87hu4chip55vcnsqoa30e3ok3i.apps.googleusercontent.com"
data-callback="handleCredentialResponse">
</div>

<div class="google-btn">
<div class="g_id_signin"
data-type="standard"
data-size="large"
data-theme="filled_black"
data-text="continue_with"
data-shape="pill">
</div>
</div>

<a class="back-home" href="web.html">← Back to Home</a>

</div>

<script>

function handleCredentialResponse(response){

const data = parseJwt(response.credential)

localStorage.setItem("userName",data.name)
localStorage.setItem("userImage",data.picture)

window.location.href="web.html"

}

function parseJwt(token){

var base64Url = token.split('.')[1]
var base64 = base64Url.replace(/-/g,'+').replace(/_/g,'/')
var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c){
return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
}).join(''))

return JSON.parse(jsonPayload)

}

</script>

</body>

</html>
